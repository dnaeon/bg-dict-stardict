name: Verify Bulgarian StarDict coverage

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'Makefile'
      - 'vendor/**'
      - '.github/workflows/verify.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'Makefile'
      - 'vendor/**'
      - '.github/workflows/verify.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends make zip xz-utils sdcv

      - name: Install Python dependencies
        run: pip install --upgrade pyglossary python-idzip

      - name: Run unit tests
        run: make test

      - name: Build the dictionary
        run: make build

      - name: Exhaustively verify coverage
        run: make verify

      - name: Coverage report
        if: always()
        run: |
          {
            echo "## Verification result"
            echo ""
            if [ -f out/stardict/bulgarian/bulgarian.ifo ]; then
              echo '```'
              grep -E '^(wordcount|synwordcount|bookname)=' out/stardict/bulgarian/bulgarian.ifo
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
